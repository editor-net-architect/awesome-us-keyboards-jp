      # スキーマ検証ライブラリのインストール
      - name: Install dependencies
        run: pip install jsonschema

      # JSON結合 + ブランド順ソート + スキーマ検証 → site/keyboards.json を生成
      - name: Build keyboard data
        run: python scripts/build.py
