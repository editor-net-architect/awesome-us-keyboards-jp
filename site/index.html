<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="日本で買えるUS配列キーボード情報ポータル | Awesome US Keyboards JP">
  <meta name="theme-color" content="#0d1117">
  <title>Awesome US Keyboards JP</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --border-color: #30363d;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --table-row-hover: rgba(88, 166, 255, 0.1);
    }

    /* ライトモード */
    html.light-mode {
      color-scheme: light;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --table-row-hover: rgba(9, 105, 218, 0.05);
    }

    html, body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ========== ヘッダー ========== */
    .header {
      padding: 2rem;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .header-top {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      flex: 1;
      text-align: center;
    }

    .header h1 {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    .header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .theme-toggle {
      padding: 0.6rem 0.8rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      transition: all 0.2s ease;
      font-family: system-ui;
    }

    .theme-toggle:hover {
      border-color: var(--text-primary);
      background-color: rgba(88, 166, 255, 0.1);
    }

    .header .counter {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      width: 100%;
    }

    /* ========== メインレイアウト ========== */
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-x: auto;
    }

    /* ========== フィルタパネル ========== */
    .filter-section {
      margin-bottom: 2rem;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s ease;
    }

    .filter-toggle {
      width: 100%;
      padding: 1rem;
      background: none;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
    }

    .filter-toggle:hover {
      background-color: var(--bg-tertiary);
    }

    .filter-toggle-icon {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .filter-toggle.active .filter-toggle-icon {
      transform: rotate(180deg);
    }

    .filter-panel {
      display: none;
      padding: 1.5rem;
      border-top: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
    }

    .filter-panel.active {
      display: block;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .filter-group label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .filter-group select {
      padding: 0.6rem;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-group select:hover {
      border-color: var(--text-primary);
    }

    .filter-group select:focus {
      outline: none;
      border-color: var(--text-primary);
    }

    .filter-actions {
      display: flex;
      gap: 1rem;
    }

    .reset-filters-btn {
      padding: 0.7rem 1rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .reset-filters-btn:hover {
      border-color: var(--text-primary);
      background-color: var(--bg-secondary);
    }

    .reset-filters-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ========== テーブル ========== */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s ease;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--bg-secondary);
      font-size: 0.9rem;
    }

    thead {
      background-color: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
    }

    th {
      padding: 1rem 0.8rem;
      text-align: left;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      position: relative;
      border-right: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }

    th:last-child {
      border-right: none;
    }

    .sort-button {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      margin-left: 0.4rem;
      padding: 0.2rem 0.4rem;
      display: inline-block;
      transition: all 0.2s ease;
    }

    .sort-button:hover {
      color: var(--text-secondary);
    }

    td {
      padding: 1.2rem 0.8rem;
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      color: var(--text-primary);
      transition: background-color 0.2s ease;
    }

    td:last-child {
      border-right: none;
    }

    tbody tr {
      transition: background-color 0.2s ease;
      background-color: var(--bg-secondary);
    }

    html.light-mode tbody tr:nth-child(even) {
      background-color: #f8fafc;
    }

    tbody tr:hover {
      background-color: var(--table-row-hover);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* 行番号列 */
    .row-number {
      text-align: center;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      font-weight: 500;
      min-width: 50px;
    }

    /* 製品名セル */
    .product-cell {
      min-width: 220px;
    }

    .product-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }

    .product-id {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    /* バッジ */
    .badge {
      display: inline-block;
      padding: 0.35rem 0.6rem;
      border-radius: 16px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      font-weight: 500;
      white-space: nowrap;
    }

    /* レイアウトバッジ */
    .badge-layout {
      color: white;
      font-weight: 600;
    }

    .badge-layout-100 {
      background-color: #2563eb;
    }

    .badge-layout-80 {
      background-color: #16a34a;
    }

    .badge-layout-75 {
      background-color: #8b5cf6;
    }

    .badge-layout-65 {
      background-color: #0891b2;
    }

    .badge-layout-60 {
      background-color: #ea580c;
    }

    .badge-layout-40 {
      background-color: #dc2626;
    }

    .badge-layout-split {
      background-color: #db2777;
    }

    /* スイッチフィール */
    .badge-feel {
      font-weight: 500;
      display: inline-block;
      margin-right: 0.4rem;
    }

    .badge-feel-linear {
      background-color: #ef4444;
      color: white;
    }

    .badge-feel-tactile {
      background-color: #a855f7;
      color: white;
    }

    .badge-feel-clicky {
      background-color: #3b82f6;
      color: white;
    }

    /* ホットスワップ */
    .hotswap-yes {
      color: #16a34a;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    .hotswap-no {
      color: #dc2626;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    /* 接続バッジ */
    .badge-connectivity {
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      margin-right: 0.4rem;
    }

    /* 技適アイコン */
    .cert-icon {
      font-size: 1.1rem;
    }

    /* 入手性バッジ */
    .badge-availability {
      color: white;
      font-weight: 600;
    }

    .badge-available {
      background-color: #16a34a;
    }

    .badge-import {
      background-color: #eab308;
      color: #000;
    }

    .badge-unavailable {
      background-color: #dc2626;
    }

    /* 購入ボタン */
    .purchase-links-cell {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      min-width: 100px;
    }

    .purchase-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.6rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .purchase-btn:hover {
      border-color: var(--text-primary);
      background-color: var(--bg-primary);
    }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state h2 {
      font-family: var(--font-mono);
      margin-bottom: 1rem;
      color: var(--text-primary);
      font-size: 1.2rem;
    }

    /* 注意書き */
    .notice {
      background-color: #fef3c7;
      color: #92400e;
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      font-size: 0.9rem;
      border-left: 4px solid #f59e0b;
    }

    html.light-mode .notice {
      background-color: #fef3c7;
      color: #92400e;
    }

    /* ========== レスポンシブ（モバイル） ========== */
    @media (max-width: 768px) {
      .main-content {
        padding: 1rem;
      }

      .filter-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      /* テーブルは横スクロール */
      .table-wrapper {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      table {
        min-width: 900px;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .header .subtitle {
        font-size: 0.9rem;
      }

      .main-content {
        padding: 0.75rem;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      .purchase-btn {
        padding: 0.3rem 0.5rem;
        font-size: 0.65rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="header-title">
          <h1>Awesome US Keyboards JP</h1>
          <p class="subtitle">日本で買えるUS配列キーボード</p>
        </div>
        <button class="theme-toggle" id="themeToggle" title="テーマ切替">☀️</button>
      </div>
      <p class="counter"><span id="modelCount">0</span> models / <span id="brandCount">0</span> brands</p>
    </header>

    <main class="main-content">
      <!-- フィルタパネル -->
      <div class="filter-section">
        <button class="filter-toggle" id="filterToggle">
          <span>フィルターを表示 / 非表示</span>
          <span class="filter-toggle-icon">▼</span>
        </button>
        <div class="filter-panel" id="filterPanel">
          <div class="filter-grid">
            <!-- テキスト検索 -->
            <div class="filter-group">
              <label for="searchInput">テキスト検索</label>
              <input type="text" id="searchInput" placeholder="名前で検索..." style="padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-primary); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.9rem;">
            </div>

            <!-- ブランド -->
            <div class="filter-group">
              <label for="brandFilter">ブランド</label>
              <select id="brandFilter">
                <option value="">すべて</option>
              </select>
            </div>

            <!-- レイアウト -->
            <div class="filter-group">
              <label for="layoutFilter">レイアウト</label>
              <select id="layoutFilter">
                <option value="">すべて</option>
                <option value="40%">40%</option>
                <option value="60%">60%</option>
                <option value="65%">65%</option>
                <option value="75%">75%</option>
                <option value="80% (TKL)">80% (TKL)</option>
                <option value="100% (Full)">100% (Full)</option>
                <option value="Split">Split</option>
              </select>
            </div>

            <!-- スイッチ技術 -->
            <div class="filter-group">
              <label for="switchFilter">スイッチ技術</label>
              <select id="switchFilter">
                <option value="">すべて</option>
                <option value="Mechanical">Mechanical</option>
                <option value="Topre (Capacitive)">Topre (Capacitive)</option>
                <option value="Hall Effect (Magnetic)">Hall Effect (Magnetic)</option>
                <option value="Optical">Optical</option>
              </select>
            </div>

            <!-- スイッチフィール -->
            <div class="filter-group">
              <label for="feelFilter">スイッチフィール</label>
              <select id="feelFilter">
                <option value="">すべて</option>
                <option value="Linear">Linear</option>
                <option value="Tactile">Tactile</option>
                <option value="Clicky">Clicky</option>
              </select>
            </div>

            <!-- 接続方式 -->
            <div class="filter-group">
              <label for="connectivityFilter">接続方式</label>
              <select id="connectivityFilter">
                <option value="">すべて</option>
                <option value="USB-A">USB-A</option>
                <option value="USB-C">USB-C</option>
                <option value="Mini USB">Mini USB</option>
                <option value="Bluetooth">Bluetooth</option>
                <option value="2.4GHz Dongle">2.4GHz Dongle</option>
              </select>
            </div>

            <!-- プロファイル -->
            <div class="filter-group">
              <label for="profileFilter">プロファイル</label>
              <select id="profileFilter">
                <option value="">すべて</option>
                <option value="Normal">Normal</option>
                <option value="Low-Profile">Low-Profile</option>
              </select>
            </div>

            <!-- ホットスワップ -->
            <div class="filter-group">
              <label for="hotswapFilter">ホットスワップ</label>
              <select id="hotswapFilter">
                <option value="">すべて</option>
                <option value="true">対応</option>
                <option value="false">非対応</option>
              </select>
            </div>

            <!-- 技適 -->
            <div class="filter-group">
              <label for="gitekiFilter">技適</label>
              <select id="gitekiFilter">
                <option value="">すべて</option>
                <option value="Certified">認証済</option>
                <option value="Wired Only">ワイヤードのみ</option>
                <option value="No/Unknown">未認証/不明</option>
              </select>
            </div>

            <!-- タグ -->
            <div class="filter-group">
              <label for="tagFilter">タグ</label>
              <select id="tagFilter">
                <option value="">すべて</option>
              </select>
            </div>
          </div>

          <div class="filter-actions">
            <button class="reset-filters-btn" id="resetFiltersBtn">リセット</button>
          </div>
        </div>
      </div>

      <!-- テーブル -->
      <div class="table-wrapper">
        <table id="keyboardTable">
          <thead>
            <tr>
              <th>#</th>
              <th>モデル名 <button class="sort-button" data-column="name">▲▼</button></th>
              <th>レイアウト <button class="sort-button" data-column="layout">▲▼</button></th>
              <th>プロファイル <button class="sort-button" data-column="profile">▲▼</button></th>
              <th>スイッチ技術 <button class="sort-button" data-column="switch">▲▼</button></th>
              <th>スイッチフィール</th>
              <th>ホットスワップ</th>
              <th>バックライト</th>
              <th>接続</th>
              <th>技適</th>
              <th>入手性</th>
              <th>購入</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <h2>キーボードが見つかりません</h2>
        <p>別のフィルタを試してください</p>
      </div>

      <div class="notice">
        ※ データは2026年3月時点のものです。最新情報は公式サイトでご確認ください。
      </div>
    </main>
  </div>

  <script>
    // ========== テーマ管理 ==========
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      setTheme(savedTheme);
    }

    function setTheme(theme) {
      if (theme === 'light') {
        html.classList.add('light-mode');
        themeToggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.remove('light-mode');
        themeToggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.classList.contains('light-mode') ? 'light' : 'dark';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      setTheme(newTheme);
    });

    // ========== フィルタトグル ==========
    const filterToggle = document.getElementById('filterToggle');
    const filterPanel = document.getElementById('filterPanel');

    filterToggle.addEventListener('click', () => {
      filterToggle.classList.toggle('active');
      filterPanel.classList.toggle('active');
    });

    // ========== データ管理 ==========
    let allKeyboards = [];
    let filteredKeyboards = [];
    let sortState = {
      column: null,
      direction: null // 'asc', 'desc'
    };

    const filterState = {
      search: '',
      brand: '',
      layout: '',
      switch: '',
      feel: '',
      connectivity: '',
      profile: '',
      hotswap: '',
      giteki: '',
      tag: ''
    };

    // ========== データ読み込み ==========
    async function loadKeyboards() {
      try {
        try {
          const response = await fetch('./keyboards.json');
          if (response.ok) {
            allKeyboards = await response.json();
            console.log('Loaded keyboards.json');
            return;
          }
        } catch (e) {
          console.log('keyboards.json not found, trying fallback');
        }

        const fallbackResponse = await fetch('../data/filco.json');
        if (fallbackResponse.ok) {
          allKeyboards = await fallbackResponse.json();
          console.log('Loaded filco.json as fallback');
          return;
        }

        throw new Error('Could not load keyboard data');
      } catch (error) {
        console.error('Error loading keyboards:', error);
        allKeyboards = [];
      }
    }

    // ========== フィルタ初期化 ==========
    function initializeFilters() {
      // ブランド
      const brands = [...new Set(allKeyboards.map(kb => kb.brand))].sort();
      const brandSelect = document.getElementById('brandFilter');
      brands.forEach(brand => {
        const option = document.createElement('option');
        option.value = brand;
        option.textContent = brand;
        brandSelect.appendChild(option);
      });

      // タグ
      const allTags = [...new Set(allKeyboards.flatMap(kb => kb.tags || []))].sort();
      const tagSelect = document.getElementById('tagFilter');
      allTags.forEach(tag => {
        const option = document.createElement('option');
        option.value = tag;
        option.textContent = tag;
        tagSelect.appendChild(option);
      });
    }

    // ========== フィルタイベント ==========
    document.getElementById('searchInput').addEventListener('input', (e) => {
      filterState.search = e.target.value;
      applyFilters();
    });

    document.getElementById('brandFilter').addEventListener('change', (e) => {
      filterState.brand = e.target.value;
      applyFilters();
    });

    document.getElementById('layoutFilter').addEventListener('change', (e) => {
      filterState.layout = e.target.value;
      applyFilters();
    });

    document.getElementById('switchFilter').addEventListener('change', (e) => {
      filterState.switch = e.target.value;
      applyFilters();
    });

    document.getElementById('feelFilter').addEventListener('change', (e) => {
      filterState.feel = e.target.value;
      applyFilters();
    });

    document.getElementById('connectivityFilter').addEventListener('change', (e) => {
      filterState.connectivity = e.target.value;
      applyFilters();
    });

    document.getElementById('profileFilter').addEventListener('change', (e) => {
      filterState.profile = e.target.value;
      applyFilters();
    });

    document.getElementById('hotswapFilter').addEventListener('change', (e) => {
      filterState.hotswap = e.target.value;
      applyFilters();
    });

    document.getElementById('gitekiFilter').addEventListener('change', (e) => {
      filterState.giteki = e.target.value;
      applyFilters();
    });

    document.getElementById('tagFilter').addEventListener('change', (e) => {
      filterState.tag = e.target.value;
      applyFilters();
    });

    // ========== リセットボタン ==========
    document.getElementById('resetFiltersBtn').addEventListener('click', () => {
      filterState.search = '';
      filterState.brand = '';
      filterState.layout = '';
      filterState.switch = '';
      filterState.feel = '';
      filterState.connectivity = '';
      filterState.profile = '';
      filterState.hotswap = '';
      filterState.giteki = '';
      filterState.tag = '';

      document.getElementById('searchInput').value = '';
      document.getElementById('brandFilter').value = '';
      document.getElementById('layoutFilter').value = '';
      document.getElementById('switchFilter').value = '';
      document.getElementById('feelFilter').value = '';
      document.getElementById('connectivityFilter').value = '';
      document.getElementById('profileFilter').value = '';
      document.getElementById('hotswapFilter').value = '';
      document.getElementById('gitekiFilter').value = '';
      document.getElementById('tagFilter').value = '';

      sortState.column = null;
      sortState.direction = null;
      applyFilters();
    });

    // ========== フィルタ適用 ==========
    function applyFilters() {
      filteredKeyboards = allKeyboards.filter(kb => {
        // テキスト検索
        if (filterState.search.trim() !== '') {
          const searchLower = filterState.search.toLowerCase();
          const matchesName = kb.name.toLowerCase().includes(searchLower);
          const matchesBrand = kb.brand.toLowerCase().includes(searchLower);
          if (!matchesName && !matchesBrand) return false;
        }

        // ブランド
        if (filterState.brand && kb.brand !== filterState.brand) return false;

        // レイアウト
        if (filterState.layout && kb.specs.layout_size !== filterState.layout) return false;

        // スイッチ技術
        if (filterState.switch && kb.specs.switch_technology !== filterState.switch) return false;

        // スイッチフィール
        if (filterState.feel && !kb.specs.switch_feels_available.includes(filterState.feel)) return false;

        // 接続方式
        if (filterState.connectivity && !kb.specs.connectivity.includes(filterState.connectivity)) return false;

        // プロファイル
        if (filterState.profile && kb.specs.profile !== filterState.profile) return false;

        // ホットスワップ
        if (filterState.hotswap !== '') {
          const hotswapValue = filterState.hotswap === 'true';
          if (kb.specs.switch_hotswap !== hotswapValue) return false;
        }

        // 技適
        if (filterState.giteki && kb.japan_context.giteki !== filterState.giteki) return false;

        // タグ
        if (filterState.tag && !kb.tags.includes(filterState.tag)) return false;

        return true;
      });

      // ソート適用
      if (sortState.column && sortState.direction) {
        filteredKeyboards.sort((a, b) => {
          let valA, valB;

          if (sortState.column === 'name') {
            valA = a.name.toLowerCase();
            valB = b.name.toLowerCase();
          } else if (sortState.column === 'layout') {
            const layoutOrder = { '40%': 1, '60%': 2, '65%': 3, '75%': 4, '80% (TKL)': 5, '100% (Full)': 6, 'Split': 7 };
            valA = layoutOrder[a.specs.layout_size] || 999;
            valB = layoutOrder[b.specs.layout_size] || 999;
          } else if (sortState.column === 'profile') {
            valA = a.specs.profile.toLowerCase();
            valB = b.specs.profile.toLowerCase();
          } else if (sortState.column === 'switch') {
            valA = a.specs.switch_technology.toLowerCase();
            valB = b.specs.switch_technology.toLowerCase();
          }

          if (valA < valB) return sortState.direction === 'asc' ? -1 : 1;
          if (valA > valB) return sortState.direction === 'asc' ? 1 : -1;
          return 0;
        });
      }

      renderTable();
      updateCounter();
    }

    // ========== ソートボタン ==========
    document.querySelectorAll('.sort-button').forEach(btn => {
      btn.addEventListener('click', () => {
        const column = btn.getAttribute('data-column');

        if (sortState.column === column) {
          if (sortState.direction === 'asc') {
            sortState.direction = 'desc';
          } else if (sortState.direction === 'desc') {
            sortState.column = null;
            sortState.direction = null;
          }
        } else {
          sortState.column = column;
          sortState.direction = 'asc';
        }

        applyFilters();
      });
    });

    // ========== テーブル表示 ==========
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      if (filteredKeyboards.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      tbody.innerHTML = filteredKeyboards.map((kb, index) => createTableRow(kb, index + 1)).join('');
    }

    function createTableRow(kb, rowNumber) {
      // レイアウトバッジ
      const layoutClass = kb.specs.layout_size
        .replace('100% (Full)', '100')
        .replace('80% (TKL)', '80')
        .replace('75%', '75')
        .replace('65%', '65')
        .replace('60%', '60')
        .replace('40%', '40')
        .replace('Split', 'split');

      const layoutBadge = `<span class="badge badge-layout badge-layout-${layoutClass}">${kb.specs.layout_size}</span>`;

      // スイッチフィール
      const feelsHtml = kb.specs.switch_feels_available.map(feel => {
        const feelClass = feel === 'Linear' ? 'badge-feel-linear' :
                         feel === 'Tactile' ? 'badge-feel-tactile' :
                         'badge-feel-clicky';
        return `<span class="badge badge-feel ${feelClass}">${feel}</span>`;
      }).join('');

      // ホットスワップ
      const hotswapHtml = kb.specs.switch_hotswap
        ? '<span class="hotswap-yes">○</span>'
        : '<span class="hotswap-no">✕</span>';

      // バックライト
      const backlightText = kb.specs.backlight || 'None';

      // 接続方式
      const connectivityHtml = kb.specs.connectivity.map(conn =>
        `<span class="badge badge-connectivity">${conn}</span>`
      ).join('');

      // 技適
      const gitekiInfo = {
        'Certified': '✅',
        'Wired Only': '➖',
        'No/Unknown': '❌'
      }[kb.japan_context.giteki] || '❌';

      // 入手性
      const availabilityClass =
        kb.japan_context.availability === 'Available' ? 'badge-available' :
        kb.japan_context.availability === 'Import Only' ? 'badge-import' :
        'badge-unavailable';
      const availabilityLabel =
        kb.japan_context.availability === 'Available' ? '国内販売' :
        kb.japan_context.availability === 'Import Only' ? '輸入のみ' :
        '入手不可';

      // 購入リンク
      const purchaseLinksHtml = kb.japan_context.purchase_urls.map(url => {
        const domain = new URL(url).hostname;
        let label = 'Buy';
        if (domain.includes('amazon')) label = 'Amazon';
        else if (domain.includes('diatec')) label = 'DIATEC';
        else if (domain.includes('rakuten')) label = '楽天';

        return `<a href="${url}" target="_blank" class="purchase-btn">${label}</a>`;
      }).join('');

      return `
        <tr>
          <td class="row-number">${rowNumber}</td>
          <td class="product-cell">
            <div class="product-name">${kb.name}</div>
            <div class="product-id">${kb.id}</div>
          </td>
          <td>${layoutBadge}</td>
          <td>${kb.specs.profile}</td>
          <td>${kb.specs.switch_technology}</td>
          <td>${feelsHtml}</td>
          <td>${hotswapHtml}</td>
          <td>${backlightText}</td>
          <td>${connectivityHtml}</td>
          <td><span class="cert-icon">${gitekiInfo}</span></td>
          <td><span class="badge badge-availability ${availabilityClass}">${availabilityLabel}</span></td>
          <td class="purchase-links-cell">${purchaseLinksHtml}</td>
        </tr>
      `;
    }

    // ========== カウンター更新 ==========
    function updateCounter() {
      const modelCount = filteredKeyboards.length;
      const brandCount = new Set(filteredKeyboards.map(kb => kb.brand)).size;

      document.getElementById('modelCount').textContent = modelCount;
      document.getElementById('brandCount').textContent = brandCount;
    }

    // ========== 初期化 ==========
    async function init() {
      initTheme();
      await loadKeyboards();
      initializeFilters();
      applyFilters();
    }

    init();
  </script>
</body>
</html>
