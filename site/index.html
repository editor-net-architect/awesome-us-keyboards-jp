<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="日本で買えるUS配列キーボード情報ポータル | Awesome US Keyboards JP">
  <meta name="theme-color" content="#0d1117">
  <title>Awesome US Keyboards JP</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --accent-green: #58a6ff;
      --accent-orange: #fb8500;
      --badge-red: #f85149;
      --badge-yellow: #d29922;
      --badge-green: #3fb950;
      --badge-blue: #58a6ff;
      --badge-purple: #bc8ef9;
      --border-color: #30363d;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    html, body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    /* ========== ヘッダー ========== */
    .header {
      grid-column: 1 / -1;
      padding: 2rem;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      text-align: center;
    }

    .header h1 {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
      color: var(--accent-green);
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    .header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-family: var(--font-mono);
    }

    .header .counter {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--accent-green);
      letter-spacing: 0.5px;
    }

    /* ========== メインレイアウト ========== */
    .main-wrapper {
      display: grid;
      grid-template-columns: 280px 1fr;
      width: 100%;
    }

    /* ========== サイドバー/フィルタパネル ========== */
    .sidebar {
      background-color: var(--bg-secondary);
      border-right: 1px solid var(--border-color);
      padding: 1.5rem;
      overflow-y: auto;
      max-height: calc(100vh - 200px);
    }

    .filter-section {
      margin-bottom: 2rem;
    }

    .filter-section h3 {
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--accent-green);
      margin-bottom: 0.8rem;
      letter-spacing: 1px;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .filter-group label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.9rem;
      color: var(--text-primary);
      cursor: pointer;
      user-select: none;
    }

    .filter-group input[type="checkbox"] {
      cursor: pointer;
      width: 18px;
      height: 18px;
      accent-color: var(--accent-green);
    }

    .search-box {
      margin-bottom: 2rem;
    }

    .search-box input {
      width: 100%;
      padding: 0.7rem;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
    }

    .search-box input::placeholder {
      color: var(--text-secondary);
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent-green);
      box-shadow: 0 0 0 2px rgba(88, 166, 255, 0.2);
    }

    /* ========== コンテンツエリア ========== */
    .content {
      padding: 2rem;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      auto-flow: dense;
    }

    /* ========== キーボードカード ========== */
    .card {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 1.5rem;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .card:hover {
      border-color: var(--accent-green);
      box-shadow: 0 0 12px rgba(88, 166, 255, 0.1);
    }

    .card-header {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 0.8rem;
    }

    .card-brand {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      text-transform: uppercase;
      color: var(--accent-orange);
      letter-spacing: 1px;
      font-weight: 600;
    }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      word-break: break-word;
    }

    /* ========== スペック行 ========== */
    .specs-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
      line-height: 1.4;
    }

    .specs-row span {
      display: inline-block;
    }

    .specs-separator {
      color: var(--border-color);
    }

    /* ========== バッジ ========== */
    .badge {
      display: inline-block;
      padding: 0.35rem 0.6rem;
      border-radius: 16px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      font-weight: 500;
      white-space: nowrap;
    }

    .badge-feel-linear {
      background-color: rgba(248, 81, 73, 0.2);
      color: #f85149;
      border: 1px solid #f85149;
    }

    .badge-feel-tactile {
      background-color: rgba(188, 142, 249, 0.2);
      color: #bc8ef9;
      border: 1px solid #bc8ef9;
    }

    .badge-feel-clicky {
      background-color: rgba(88, 166, 255, 0.2);
      color: #58a6ff;
      border: 1px solid #58a6ff;
    }

    .badge-available {
      background-color: rgba(63, 185, 80, 0.2);
      color: #3fb950;
      border: 1px solid #3fb950;
    }

    .badge-import {
      background-color: rgba(210, 153, 34, 0.2);
      color: #d29922;
      border: 1px solid #d29922;
    }

    .badge-unavailable {
      background-color: rgba(248, 81, 73, 0.2);
      color: #f85149;
      border: 1px solid #f85149;
    }

    .badge-tag {
      background-color: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .badge-certification {
      font-size: 0.7rem;
      padding: 0.4rem 0.6rem;
    }

    /* ========== ホットスワップ・コネクティビティ ========== */
    .features {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .feature-icon {
      font-size: 1rem;
    }

    /* ========== 接続方式 ========== */
    .connectivity {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .conn-badge {
      padding: 0.3rem 0.6rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    /* ========== 打鍵感 ========== */
    .feels {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    /* ========== カスタマイズ ========== */
    .customization {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .customization-badge {
      padding: 0.3rem 0.6rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--accent-blue);
    }

    /* ========== 購入リンク ========== */
    .purchase-links {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border-color);
    }

    .purchase-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.4rem 0.8rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--accent-green);
      text-decoration: none;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      transition: all 0.2s ease;
    }

    .purchase-link:hover {
      border-color: var(--accent-green);
      background-color: rgba(88, 166, 255, 0.1);
    }

    .purchase-link::after {
      content: '↗';
      font-size: 0.8rem;
    }

    /* ========== タグ ========== */
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border-color);
    }

    /* ========== 空状態 ========== */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 3rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state h2 {
      font-family: var(--font-mono);
      margin-bottom: 1rem;
      color: var(--text-primary);
    }

    /* ========== レスポンシブ ========== */
    @media (max-width: 1200px) {
      .content {
        grid-template-columns: repeat(2, 1fr);
        gap: 1.2rem;
      }
    }

    @media (max-width: 768px) {
      .main-wrapper {
        grid-template-columns: 1fr;
      }

      .sidebar {
        max-height: auto;
        padding: 1rem;
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }

      .sidebar.collapsed {
        display: none;
      }

      .content {
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
      }

      .header {
        padding: 1.5rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .filter-toggle-btn {
        display: block;
        margin-bottom: 1rem;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.25rem;
      }

      .header .subtitle {
        font-size: 0.9rem;
      }

      .card {
        padding: 1rem;
        gap: 0.8rem;
      }

      .specs-row {
        font-size: 0.8rem;
      }

      .purchase-links {
        gap: 0.4rem;
      }

      .purchase-link {
        padding: 0.35rem 0.6rem;
        font-size: 0.7rem;
      }
    }

    /* ========== フィルタトグルボタン（モバイル） ========== */
    .filter-toggle-btn {
      display: none;
      width: 100%;
      padding: 0.7rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      font-family: var(--font-mono);
      cursor: pointer;
      border-radius: 4px;
      margin-bottom: 1rem;
    }

    .filter-toggle-btn:hover {
      border-color: var(--accent-green);
    }

    @media (max-width: 768px) {
      .filter-toggle-btn {
        display: block;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Awesome US Keyboards JP</h1>
      <p class="subtitle">日本で買えるUS配列キーボード</p>
      <p class="counter"><span id="modelCount">0</span> models / <span id="brandCount">0</span> brands</p>
    </header>

    <div class="main-wrapper">
      <aside class="sidebar" id="sidebar">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="製品名・ブランド検索...">
        </div>

        <div class="filter-section">
          <h3>ブランド</h3>
          <div class="filter-group" id="brandFilter"></div>
        </div>

        <div class="filter-section">
          <h3>レイアウト</h3>
          <div class="filter-group" id="layoutFilter"></div>
        </div>

        <div class="filter-section">
          <h3>スイッチ技術</h3>
          <div class="filter-group" id="switchTechFilter"></div>
        </div>

        <div class="filter-section">
          <h3>接続方式</h3>
          <div class="filter-group" id="connectivityFilter"></div>
        </div>

        <div class="filter-section">
          <h3>日本入手性</h3>
          <div class="filter-group" id="availabilityFilter"></div>
        </div>
      </aside>

      <main class="content" id="content">
        <!-- カードがここに動的に挿入される -->
      </main>
    </div>
  </div>

  <script>
    // ========== データ管理 ==========
    let allKeyboards = [];
    let filteredKeyboards = [];

    const filterState = {
      brands: new Set(),
      layouts: new Set(),
      switchTechs: new Set(),
      connectivities: new Set(),
      availabilities: new Set(),
      search: ''
    };

    // ========== データ読み込み ==========
    async function loadKeyboards() {
      try {
        // 試行1: keyboards.json（デプロイ時に生成される統合ファイル）
        try {
          const response = await fetch('./keyboards.json');
          if (response.ok) {
            allKeyboards = await response.json();
            console.log('Loaded keyboards.json');
            return;
          }
        } catch (e) {
          console.log('keyboards.json not found, trying fallback');
        }

        // フォールバック: filco.json
        const fallbackResponse = await fetch('../data/filco.json');
        if (fallbackResponse.ok) {
          allKeyboards = await fallbackResponse.json();
          console.log('Loaded filco.json as fallback');
          return;
        }

        throw new Error('Could not load keyboard data');
      } catch (error) {
        console.error('Error loading keyboards:', error);
        allKeyboards = [];
      }
    }

    // ========== フィルタオプション生成 ==========
    function generateFilterOptions() {
      const layouts = ['40%', '60%', '65%', '75%', '80% (TKL)', '100% (Full)', 'Split'];
      const switchTechs = ['Mechanical', 'Topre (Capacitive)', 'Hall Effect (Magnetic)', 'Optical'];
      const connectivities = ['USB-A', 'USB-C', 'Mini USB', 'Bluetooth', '2.4GHz Dongle'];
      const availabilities = [
        { value: 'Available', label: '国内販売' },
        { value: 'Import Only', label: '輸入のみ' },
        { value: 'Unavailable', label: '入手不可' }
      ];

      // ブランド（動的）
      const brands = [...new Set(allKeyboards.map(kb => kb.brand))].sort();
      renderFilterGroup('brandFilter', brands, 'brands');

      // レイアウト
      renderFilterGroup('layoutFilter', layouts, 'layouts');

      // スイッチ技術
      renderFilterGroup('switchTechFilter', switchTechs, 'switchTechs');

      // 接続方式
      renderFilterGroup('connectivityFilter', connectivities, 'connectivities');

      // 入手性
      renderFilterGroup('availabilityFilter', availabilities, 'availabilities', true);
    }

    function renderFilterGroup(elementId, options, filterKey, isCustomLabel = false) {
      const container = document.getElementById(elementId);
      container.innerHTML = '';

      options.forEach(option => {
        const value = isCustomLabel ? option.value : option;
        const label = isCustomLabel ? option.label : option;
        const checkboxId = `${filterKey}-${value}`;

        const labelEl = document.createElement('label');
        labelEl.innerHTML = `
          <input type="checkbox" id="${checkboxId}" value="${value}">
          <span>${label}</span>
        `;

        labelEl.querySelector('input').addEventListener('change', (e) => {
          if (e.target.checked) {
            filterState[filterKey].add(value);
          } else {
            filterState[filterKey].delete(value);
          }
          applyFilters();
        });

        container.appendChild(labelEl);
      });
    }

    // ========== フィルタ適用 ==========
    function applyFilters() {
      filteredKeyboards = allKeyboards.filter(kb => {
        // ブランドフィルタ
        if (filterState.brands.size > 0 && !filterState.brands.has(kb.brand)) {
          return false;
        }

        // レイアウトフィルタ
        if (filterState.layouts.size > 0 && !filterState.layouts.has(kb.specs.layout_size)) {
          return false;
        }

        // スイッチ技術フィルタ
        if (filterState.switchTechs.size > 0 && !filterState.switchTechs.has(kb.specs.switch_technology)) {
          return false;
        }

        // 接続方式フィルタ
        if (filterState.connectivities.size > 0) {
          const hasConnectivity = Array.from(filterState.connectivities).some(conn =>
            kb.specs.connectivity.includes(conn)
          );
          if (!hasConnectivity) return false;
        }

        // 入手性フィルタ
        if (filterState.availabilities.size > 0 && !filterState.availabilities.has(kb.japan_context.availability)) {
          return false;
        }

        // テキスト検索
        if (filterState.search.trim() !== '') {
          const searchLower = filterState.search.toLowerCase();
          const matchesName = kb.name.toLowerCase().includes(searchLower);
          const matchesBrand = kb.brand.toLowerCase().includes(searchLower);
          if (!matchesName && !matchesBrand) return false;
        }

        return true;
      });

      renderKeyboards();
      updateCounter();
    }

    // ========== キーボード表示 ==========
    function renderKeyboards() {
      const content = document.getElementById('content');

      if (filteredKeyboards.length === 0) {
        content.innerHTML = `
          <div class="empty-state">
            <h2>キーボードが見つかりません</h2>
            <p>別のフィルタを試してください</p>
          </div>
        `;
        return;
      }

      content.innerHTML = filteredKeyboards.map(kb => createKeyboardCard(kb)).join('');
    }

    function createKeyboardCard(kb) {
      // スペック行の作成
      const profileLabel = kb.specs.profile === 'Low-Profile' ? 'Low-Profile' : 'Normal';
      const weightLabel = kb.specs.weight_g ? `${kb.specs.weight_g}g` : 'N/A';

      const specsHtml = `
        ${kb.specs.layout_size} |
        ${kb.specs.switch_technology} |
        ${profileLabel} |
        ${weightLabel}
      `;

      // スイッチフィール（ピル）
      const feelsHtml = kb.specs.switch_feels_available.map(feel => {
        const feelClass = feel === 'Linear' ? 'badge-feel-linear' :
                         feel === 'Tactile' ? 'badge-feel-tactile' :
                         'badge-feel-clicky';
        return `<span class="badge ${feelClass}">${feel}</span>`;
      }).join('');

      // ホットスワップ
      const hotswapIcon = kb.specs.switch_hotswap ? '🔥' : '⚙️';
      const hotswapLabel = kb.specs.switch_hotswap ? 'Hotswap' : 'Soldered';

      // 接続方式
      const connectivityHtml = kb.specs.connectivity.map(conn =>
        `<span class="conn-badge">${conn}</span>`
      ).join('');

      // 技適認証
      const gitekiLabels = {
        'Certified': { icon: '✅', label: 'Certified' },
        'Wired Only': { icon: '➖', label: 'Wired Only' },
        'No/Unknown': { icon: '❌', label: 'No/Unknown' }
      };
      const gitekiInfo = gitekiLabels[kb.japan_context.giteki] || gitekiLabels['No/Unknown'];

      // 日本入手性
      const availabilityClass =
        kb.japan_context.availability === 'Available' ? 'badge-available' :
        kb.japan_context.availability === 'Import Only' ? 'badge-import' :
        'badge-unavailable';
      const availabilityLabel =
        kb.japan_context.availability === 'Available' ? '国内販売' :
        kb.japan_context.availability === 'Import Only' ? '輸入のみ' :
        '入手不可';

      // 購入リンク
      const purchaseLinksHtml = kb.japan_context.purchase_urls.map(url => {
        const domain = new URL(url).hostname;
        let label = 'Buy';
        if (domain.includes('amazon')) label = 'Amazon';
        else if (domain.includes('diatec')) label = 'DIATEC';
        else if (domain.includes('rakuten')) label = '楽天';

        return `<a href="${url}" target="_blank" class="purchase-link">${label}</a>`;
      }).join('');

      // カスタマイズ
      const customizationHtml = kb.specs.customization_method && kb.specs.customization_method !== 'None'
        ? `<div class="customization">
             <span>⚙️</span>
             <span class="customization-badge">${kb.specs.customization_method}</span>
           </div>`
        : '';

      // タグ
      const tagsHtml = kb.tags && kb.tags.length > 0
        ? `<div class="tags">
             ${kb.tags.map(tag => `<span class="badge badge-tag">#${tag}</span>`).join('')}
           </div>`
        : '';

      return `
        <div class="card">
          <div class="card-header">
            <div class="card-brand">${kb.brand}</div>
            <div class="card-name">${kb.name}</div>
          </div>

          <div class="specs-row">${specsHtml}</div>

          <div class="features">
            <div class="feature-item">
              <span class="feature-icon">${hotswapIcon}</span>
              <span>${hotswapLabel}</span>
            </div>
            <div class="feature-item">
              <span class="feature-icon">${gitekiInfo.icon}</span>
              <span class="badge badge-certification">${gitekiInfo.label}</span>
            </div>
            <div class="feature-item">
              <span class="badge ${availabilityClass}">${availabilityLabel}</span>
            </div>
          </div>

          <div class="connectivity">${connectivityHtml}</div>

          <div class="feels">${feelsHtml}</div>

          ${customizationHtml}

          ${tagsHtml}

          <div class="purchase-links">${purchaseLinksHtml}</div>
        </div>
      `;
    }

    // ========== カウンター更新 ==========
    function updateCounter() {
      const modelCount = filteredKeyboards.length;
      const brandCount = new Set(filteredKeyboards.map(kb => kb.brand)).size;

      document.getElementById('modelCount').textContent = modelCount;
      document.getElementById('brandCount').textContent = brandCount;
    }

    // ========== 検索入力ハンドラ ==========
    document.getElementById('searchInput').addEventListener('input', (e) => {
      filterState.search = e.target.value;
      applyFilters();
    });

    // ========== 初期化 ==========
    async function init() {
      await loadKeyboards();
      generateFilterOptions();
      applyFilters();
    }

    init();
  </script>
