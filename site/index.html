<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="日本で買えるUS配列キーボード情報ポータル | Awesome US Keyboards JP">
  <meta name="theme-color" content="#0d1117">
  <title>Awesome US Keyboards JP</title>

  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      color-scheme: dark;
      --bg-primary: #0d1117;
      --bg-secondary: #161b22;
      --bg-tertiary: #21262d;
      --text-primary: #c9d1d9;
      --text-secondary: #8b949e;
      --border-color: #30363d;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --table-row-hover: rgba(88, 166, 255, 0.1);
    }

    /* ライトモード */
    html.light-mode {
      color-scheme: light;
      --bg-primary: #ffffff;
      --bg-secondary: #f8fafc;
      --bg-tertiary: #f1f5f9;
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --border-color: #e2e8f0;
      --table-row-hover: rgba(9, 105, 218, 0.05);
    }

    html, body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      line-height: 1.6;
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ========== ヘッダー ========== */
    .header {
      padding: 2rem;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-color);
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      transition: background-color 0.2s ease, border-color 0.2s ease;
    }

    .header-top {
      display: flex;
      width: 100%;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      flex: 1;
      text-align: center;
    }

    .header h1 {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.5rem;
      letter-spacing: 1px;
    }

    .header .subtitle {
      font-size: 1rem;
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    .theme-toggle {
      padding: 0.6rem 0.8rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 44px;
      height: 44px;
      transition: all 0.2s ease;
      font-family: system-ui;
    }

    .theme-toggle:hover {
      border-color: var(--text-primary);
      background-color: rgba(88, 166, 255, 0.1);
    }

    .header .counter {
      font-family: var(--font-mono);
      font-size: 0.9rem;
      color: var(--text-secondary);
      letter-spacing: 0.5px;
      width: 100%;
    }

    /* ========== メインレイアウト ========== */
    .main-content {
      flex: 1;
      padding: 2rem;
      overflow-x: auto;
    }

    /* ========== フィルタパネル ========== */
    .filter-section {
      margin-bottom: 2rem;
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s ease;
    }

    .filter-toggle {
      width: 100%;
      padding: 1rem;
      background: none;
      border: none;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: all 0.2s ease;
    }

    .filter-toggle:hover {
      background-color: var(--bg-tertiary);
    }

    .filter-toggle-icon {
      display: inline-block;
      transition: transform 0.2s ease;
    }

    .filter-toggle.active .filter-toggle-icon {
      transform: rotate(180deg);
    }

    .filter-panel {
      display: none;
      padding: 1.5rem;
      border-top: 1px solid var(--border-color);
      background-color: var(--bg-secondary);
    }

    .filter-panel.active {
      display: block;
    }

    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .filter-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .filter-group label {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-badge-count {
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 0.15rem 0.4rem;
      font-size: 0.65rem;
      color: var(--text-secondary);
      margin-left: 0.3rem;
    }

    .filter-group select {
      padding: 0.6rem;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .filter-group select:hover {
      border-color: var(--text-primary);
    }

    .filter-group select:focus {
      outline: none;
      border-color: var(--text-primary);
    }

    /* カスタムマルチセレクト */
    .multi-select-wrapper {
      position: relative;
    }

    .multi-select-trigger {
      padding: 0.6rem;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      font-family: var(--font-mono);
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 38px;
      width: 100%;
    }

    .multi-select-trigger:hover {
      border-color: var(--text-primary);
    }

    .multi-select-trigger.active {
      border-color: var(--text-primary);
      background-color: var(--bg-tertiary);
    }

    .multi-select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-top: none;
      border-radius: 0 0 4px 4px;
      margin-top: -1px;
      z-index: 10;
      max-height: 200px;
      overflow-y: auto;
      display: none;
    }

    .multi-select-dropdown.active {
      display: block;
    }

    .multi-select-option {
      padding: 0.6rem;
      border-bottom: 1px solid var(--border-color);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: background-color 0.2s ease;
    }

    .multi-select-option:hover {
      background-color: var(--bg-secondary);
    }

    .multi-select-option:last-child {
      border-bottom: none;
    }

    .multi-select-option input[type="checkbox"] {
      cursor: pointer;
      width: 16px;
      height: 16px;
    }

    .multi-select-option label {
      cursor: pointer;
      flex: 1;
      margin: 0;
      font-size: 0.9rem;
      font-weight: 400;
    }

    .filter-actions {
      display: flex;
      gap: 1rem;
    }

    .reset-filters-btn {
      padding: 0.7rem 1rem;
      background-color: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      color: var(--text-primary);
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      transition: all 0.2s ease;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .reset-filters-btn:hover {
      border-color: var(--text-primary);
      background-color: var(--bg-secondary);
    }

    .reset-filters-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ========== テーブル ========== */
    .table-wrapper {
      overflow-x: auto;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      transition: border-color 0.2s ease;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background-color: var(--bg-secondary);
      font-size: 0.9rem;
      table-layout: fixed;
    }

    thead {
      background-color: var(--bg-tertiary);
      border-bottom: 1px solid var(--border-color);
    }

    th {
      padding: 1rem 0.8rem;
      text-align: left;
      font-family: var(--font-mono);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      position: relative;
      border-right: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }

    th:last-child {
      border-right: none;
    }

    .sort-button {
      background: none;
      border: none;
      color: var(--text-primary);
      cursor: pointer;
      font-family: inherit;
      font-size: 0.75rem;
      margin-left: 0.4rem;
      padding: 0.2rem 0.4rem;
      display: inline-block;
      transition: all 0.2s ease;
    }

    .sort-button:hover {
      color: var(--text-secondary);
    }

    td {
      padding: 1.2rem 0.8rem;
      border-bottom: 1px solid var(--border-color);
      border-right: 1px solid var(--border-color);
      color: var(--text-primary);
      transition: background-color 0.2s ease;
    }

    td:last-child {
      border-right: none;
    }

    tbody tr {
      transition: background-color 0.2s ease;
      background-color: var(--bg-secondary);
    }

    html.light-mode tbody tr:nth-child(even) {
      background-color: #f8fafc;
    }

    tbody tr:hover {
      background-color: var(--table-row-hover);
    }

    tbody tr:last-child td {
      border-bottom: none;
    }

    /* 行番号列 */
    .row-number {
      display: none;
    }

    /* 製品名セル */
    .product-cell {
      min-width: 220px;
    }

    .product-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.3rem;
    }

    .product-id {
      font-size: 0.75rem;
      font-family: var(--font-mono);
      color: var(--text-secondary);
    }

    /* バッジ */
    .badge {
      display: inline-block;
      padding: 0.35rem 0.6rem;
      border-radius: 16px;
      font-size: 0.75rem;
      font-family: var(--font-mono);
      font-weight: 500;
      white-space: nowrap;
    }

    /* レイアウトバッジ */
    .badge-layout {
      color: white;
      font-weight: 600;
    }

    .badge-layout-100 {
      background-color: #2563eb;
    }

    .badge-layout-80 {
      background-color: #16a34a;
    }

    .badge-layout-75 {
      background-color: #8b5cf6;
    }

    .badge-layout-65 {
      background-color: #0891b2;
    }

    .badge-layout-60 {
      background-color: #ea580c;
    }

    .badge-layout-40 {
      background-color: #dc2626;
    }

    .badge-layout-split {
      background-color: #db2777;
    }

    /* スイッチフィール */
    .switch-feels-container {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.3rem;
      align-items: center;
    }

    .badge-feel {
      font-weight: 500;
      display: inline-block;
      font-size: 0.65rem;
      padding: 2px 6px;
      flex-shrink: 0;
    }

    .badge-feel-linear {
      background-color: #ef4444;
      color: white;
    }

    .badge-feel-tactile {
      background-color: #a855f7;
      color: white;
    }

    .badge-feel-clicky {
      background-color: #3b82f6;
      color: white;
    }

    /* ホットスワップ */
    .hotswap-yes {
      color: #16a34a;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    .hotswap-no {
      color: #dc2626;
      font-weight: 600;
      font-family: var(--font-mono);
    }

    /* 接続バッジ */
    .badge-connectivity {
      background-color: var(--bg-tertiary);
      color: var(--text-secondary);
      border: 1px solid var(--border-color);
      margin-right: 0.4rem;
    }

    /* 技適アイコン */
    .cert-icon {
      font-size: 1.1rem;
    }

    /* 入手性バッジ */
    .badge-availability {
      color: white;
      font-weight: 600;
    }

    .badge-available {
      background-color: #16a34a;
    }

    .badge-import {
      background-color: #eab308;
      color: #000;
    }

    .badge-unavailable {
      background-color: #dc2626;
    }

    /* 購入リンク */
    .purchase-links-cell .purchase-links-inner {
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .purchase-btn {
      display: block;
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.8rem;
      font-family: var(--font-mono);
      transition: all 0.2s ease;
      white-space: nowrap;
    }

    .purchase-btn:hover {
      text-decoration: underline;
      color: #79c0ff;
    }

    html.light-mode .purchase-btn {
      color: #0969da;
    }

    html.light-mode .purchase-btn:hover {
      color: #0d47a1;
    }

    /* 空状態 */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-secondary);
    }

    .empty-state h2 {
      font-family: var(--font-mono);
      margin-bottom: 1rem;
      color: var(--text-primary);
      font-size: 1.2rem;
    }

    /* 注意書き */
    .notice {
      background-color: #fef3c7;
      color: #92400e;
      padding: 1rem;
      border-radius: 4px;
      margin-top: 1rem;
      font-size: 0.9rem;
      border-left: 4px solid #f59e0b;
    }

    html.light-mode .notice {
      background-color: #fef3c7;
      color: #92400e;
    }

    /* ========== レスポンシブ（モバイル） ========== */
    @media (max-width: 768px) {
      .main-content {
        padding: 1rem;
      }

      .filter-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
      }

      /* モバイルではテーブルをカード化 */
      table {
        table-layout: auto;
      }

      thead {
        display: none;
      }

      tbody {
        display: block;
      }

      tbody tr {
        display: block;
        margin-bottom: 1rem;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        overflow: hidden;
        background-color: var(--bg-secondary);
      }

      tbody tr:hover {
        background-color: var(--bg-secondary);
      }

      tbody tr td {
        display: grid;
        grid-template-columns: 120px 1fr;
        padding: 0.8rem;
        border-bottom: 1px solid var(--border-color);
        border-right: none;
      }

      tbody tr td:before {
        content: attr(data-label);
        font-weight: 600;
        color: var(--text-primary);
        padding-right: 1rem;
        font-family: var(--font-mono);
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      tbody tr td:last-child {
        border-bottom: none;
      }

      /* モデル名をカードタイトルとして */
      td.product-cell {
        grid-template-columns: 1fr !important;
        padding: 1rem !important;
        font-weight: 700;
        border-bottom: 1px solid var(--border-color) !important;
        background-color: var(--bg-tertiary);
      }

      td.product-cell:before {
        content: "モデル名";
      }

      td.product-cell .product-name {
        margin-bottom: 0.3rem;
      }

      /* 購入リンクは横並び */
      td.purchase-links-cell {
        grid-template-columns: 120px 1fr !important;
      }

      .purchase-links-inner {
        flex-direction: row;
        gap: 0.6rem;
        align-items: center;
      }

      .purchase-btn {
        display: inline;
      }
    }

    @media (max-width: 480px) {
      .header {
        padding: 1rem;
      }

      .header h1 {
        font-size: 1.5rem;
      }

      .header .subtitle {
        font-size: 0.9rem;
      }

      .main-content {
        padding: 0.75rem;
      }

      .filter-grid {
        grid-template-columns: 1fr;
      }

      tbody tr td {
        grid-template-columns: 100px 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-top">
        <div class="header-title">
          <h1>Awesome US Keyboards JP</h1>
          <p class="subtitle">日本で買えるUS配列キーボード</p>
        </div>
        <button class="theme-toggle" id="themeToggle" title="テーマ切替">☀️</button>
      </div>
      <p class="counter"><span id="modelCount">0</span> models / <span id="brandCount">0</span> brands</p>
    </header>

    <main class="main-content">
      <!-- フィルタパネル -->
      <div class="filter-section">
        <button class="filter-toggle" id="filterToggle">
          <span>フィルターを表示 / 非表示</span>
          <span class="filter-toggle-icon">▼</span>
        </button>
        <div class="filter-panel" id="filterPanel">
          <div class="filter-grid">
            <!-- テキスト検索 -->
            <div class="filter-group">
              <label for="searchInput">テキスト検索</label>
              <input type="text" id="searchInput" placeholder="名前で検索..." style="padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 4px; background-color: var(--bg-primary); color: var(--text-primary); font-family: var(--font-mono); font-size: 0.9rem;">
            </div>

            <!-- ブランド -->
            <div class="filter-group">
              <label>ブランド <span class="filter-badge-count" id="brandCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="brandWrapper">
                <button class="multi-select-trigger" id="brandTrigger">すべて</button>
                <div class="multi-select-dropdown" id="brandDropdown"></div>
              </div>
            </div>

            <!-- レイアウト -->
            <div class="filter-group">
              <label>レイアウト <span class="filter-badge-count" id="layoutCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="layoutWrapper">
                <button class="multi-select-trigger" id="layoutTrigger">すべて</button>
                <div class="multi-select-dropdown" id="layoutDropdown"></div>
              </div>
            </div>

            <!-- スイッチ技術 -->
            <div class="filter-group">
              <label>スイッチ技術 <span class="filter-badge-count" id="switchCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="switchWrapper">
                <button class="multi-select-trigger" id="switchTrigger">すべて</button>
                <div class="multi-select-dropdown" id="switchDropdown"></div>
              </div>
            </div>

            <!-- スイッチフィール -->
            <div class="filter-group">
              <label>スイッチフィール <span class="filter-badge-count" id="feelCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="feelWrapper">
                <button class="multi-select-trigger" id="feelTrigger">すべて</button>
                <div class="multi-select-dropdown" id="feelDropdown"></div>
              </div>
            </div>

            <!-- 接続方式 -->
            <div class="filter-group">
              <label>接続方式 <span class="filter-badge-count" id="connectivityCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="connectivityWrapper">
                <button class="multi-select-trigger" id="connectivityTrigger">すべて</button>
                <div class="multi-select-dropdown" id="connectivityDropdown"></div>
              </div>
            </div>

            <!-- プロファイル -->
            <div class="filter-group">
              <label>プロファイル <span class="filter-badge-count" id="profileCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="profileWrapper">
                <button class="multi-select-trigger" id="profileTrigger">すべて</button>
                <div class="multi-select-dropdown" id="profileDropdown"></div>
              </div>
            </div>

            <!-- ホットスワップ -->
            <div class="filter-group">
              <label>ホットスワップ <span class="filter-badge-count" id="hotswapCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="hotswapWrapper">
                <button class="multi-select-trigger" id="hotswapTrigger">すべて</button>
                <div class="multi-select-dropdown" id="hotswapDropdown"></div>
              </div>
            </div>

            <!-- 技適 -->
            <div class="filter-group">
              <label>技適 <span class="filter-badge-count" id="gitekiCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="gitekiWrapper">
                <button class="multi-select-trigger" id="gitekiTrigger">すべて</button>
                <div class="multi-select-dropdown" id="gitekiDropdown"></div>
              </div>
            </div>

            <!-- タグ -->
            <div class="filter-group">
              <label>タグ <span class="filter-badge-count" id="tagCount" style="display: none;">0</span></label>
              <div class="multi-select-wrapper" id="tagWrapper">
                <button class="multi-select-trigger" id="tagTrigger">すべて</button>
                <div class="multi-select-dropdown" id="tagDropdown"></div>
              </div>
            </div>
          </div>

          <div class="filter-actions">
            <button class="reset-filters-btn" id="resetFiltersBtn">リセット</button>
          </div>
        </div>
      </div>

      <!-- テーブル -->
      <div class="table-wrapper">
        <table id="keyboardTable">
          <colgroup>
            <col style="width: 22%"><!-- モデル名 -->
            <col style="width: 9%"><!-- レイアウト -->
            <col style="width: 8%"><!-- プロファイル -->
            <col style="width: 9%"><!-- スイッチ技術 -->
            <col style="width: 14%"><!-- スイッチフィール -->
            <col style="width: 5%"><!-- ホットスワップ -->
            <col style="width: 6%"><!-- バックライト -->
            <col style="width: 8%"><!-- 接続 -->
            <col style="width: 4%"><!-- 技適 -->
            <col style="width: 7%"><!-- 入手性 -->
            <col style="width: 8%"><!-- 購入 -->
          </colgroup>
          <thead>
            <tr>
              <th>モデル名 <button class="sort-button" data-column="name">▲▼</button></th>
              <th>レイアウト <button class="sort-button" data-column="layout">▲▼</button></th>
              <th>プロファイル <button class="sort-button" data-column="profile">▲▼</button></th>
              <th>スイッチ技術 <button class="sort-button" data-column="switch">▲▼</button></th>
              <th>スイッチフィール</th>
              <th>ホットスワップ</th>
              <th>バックライト</th>
              <th>接続</th>
              <th>技適</th>
              <th>入手性</th>
              <th>購入</th>
            </tr>
          </thead>
          <tbody id="tableBody">
          </tbody>
        </table>
      </div>

      <div id="emptyState" class="empty-state" style="display: none;">
        <h2>キーボードが見つかりません</h2>
        <p>別のフィルタを試してください</p>
      </div>

      <div class="notice">
        ※ データは2026年3月時点のものです。最新情報は公式サイトでご確認ください。
      </div>
    </main>
  </div>

  <script>
    // ========== テーマ管理 ==========
    const themeToggle = document.getElementById('themeToggle');
    const html = document.documentElement;

    function initTheme() {
      const savedTheme = localStorage.getItem('theme') || 'dark';
      setTheme(savedTheme);
    }

    function setTheme(theme) {
      if (theme === 'light') {
        html.classList.add('light-mode');
        themeToggle.textContent = '🌙';
        localStorage.setItem('theme', 'light');
      } else {
        html.classList.remove('light-mode');
        themeToggle.textContent = '☀️';
        localStorage.setItem('theme', 'dark');
      }
    }

    themeToggle.addEventListener('click', () => {
      const currentTheme = html.classList.contains('light-mode') ? 'light' : 'dark';
      const newTheme = currentTheme === 'light' ? 'dark' : 'light';
      setTheme(newTheme);
    });

    // ========== フィルタトグル ==========
    const filterToggle = document.getElementById('filterToggle');
    const filterPanel = document.getElementById('filterPanel');

    filterToggle.addEventListener('click', () => {
      filterToggle.classList.toggle('active');
      filterPanel.classList.toggle('active');
    });

    // ========== データ管理 ==========
    let allKeyboards = [];
    let filteredKeyboards = [];
    let sortState = {
      column: null,
      direction: null // 'asc', 'desc'
    };

    const filterState = {
      search: '',
      brand: [],
      layout: [],
      switch: [],
      feel: [],
      connectivity: [],
      profile: [],
      hotswap: [],
      giteki: [],
      tag: []
    };

    // ========== データ読み込み ==========
    async function loadKeyboards() {
      try {
        try {
          const response = await fetch('./keyboards.json');
          if (response.ok) {
            allKeyboards = await response.json();
            console.log('Loaded keyboards.json');
            return;
          }
        } catch (e) {
          console.log('keyboards.json not found, trying fallback');
        }

        const fallbackResponse = await fetch('../data/filco.json');
        if (fallbackResponse.ok) {
          allKeyboards = await fallbackResponse.json();
          console.log('Loaded filco.json as fallback');
          return;
        }

        throw new Error('Could not load keyboard data');
      } catch (error) {
        console.error('Error loading keyboards:', error);
        allKeyboards = [];
      }
    }

    // ========== フィルタ初期化 ==========
    function initializeFilters() {
      // ブランド
      const brands = [...new Set(allKeyboards.map(kb => kb.brand))].sort();
      createMultiSelect('brand', brands);

      // レイアウト
      const layouts = ['40%', '60%', '65%', '75%', '80% (TKL)', '100% (Full)', 'Split'];
      createMultiSelect('layout', layouts);

      // スイッチ技術
      const switches = ['Mechanical', 'Topre (Capacitive)', 'Hall Effect (Magnetic)', 'Optical'];
      createMultiSelect('switch', switches);

      // スイッチフィール
      const feels = ['Linear', 'Tactile', 'Clicky'];
      createMultiSelect('feel', feels);

      // 接続方式
      const connectivities = ['USB-A', 'USB-C', 'Mini USB', 'Bluetooth', '2.4GHz Dongle'];
      createMultiSelect('connectivity', connectivities);

      // プロファイル
      const profiles = ['Normal', 'Low-Profile'];
      createMultiSelect('profile', profiles);

      // ホットスワップ
      const hotswaps = ['対応', '非対応'];
      const hotswapValues = ['true', 'false'];
      createMultiSelectWithValues('hotswap', hotswaps, hotswapValues);

      // 技適
      const gitekis = ['認証済', 'ワイヤードのみ', '未認証/不明'];
      const gitekiValues = ['Certified', 'Wired Only', 'No/Unknown'];
      createMultiSelectWithValues('giteki', gitekis, gitekiValues);

      // タグ
      const allTags = [...new Set(allKeyboards.flatMap(kb => kb.tags || []))].sort();
      createMultiSelect('tag', allTags);
    }

    // マルチセレクト作成関数
    function createMultiSelect(filterId, options) {
      const dropdown = document.getElementById(filterId + 'Dropdown');
      dropdown.innerHTML = '';

      options.forEach(option => {
        const label = document.createElement('label');
        label.className = 'multi-select-option';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = option;
        checkbox.addEventListener('change', () => handleFilterChange(filterId));

        const labelText = document.createElement('label');
        labelText.textContent = option;

        label.appendChild(checkbox);
        label.appendChild(labelText);
        dropdown.appendChild(label);
      });
    }

    // マルチセレクト作成関数（値が異なる場合）
    function createMultiSelectWithValues(filterId, labels, values) {
      const dropdown = document.getElementById(filterId + 'Dropdown');
      dropdown.innerHTML = '';

      labels.forEach((label, index) => {
        const value = values[index];
        const option = document.createElement('label');
        option.className = 'multi-select-option';

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.value = value;
        checkbox.addEventListener('change', () => handleFilterChange(filterId));

        const labelText = document.createElement('label');
        labelText.textContent = label;

        option.appendChild(checkbox);
        option.appendChild(labelText);
        dropdown.appendChild(option);
      });
    }

    // マルチセレクトトリガーのイベント設定
    function setupMultiSelectTriggers() {
      const filterIds = ['brand', 'layout', 'switch', 'feel', 'connectivity', 'profile', 'hotswap', 'giteki', 'tag'];

      filterIds.forEach(id => {
        const trigger = document.getElementById(id + 'Trigger');
        const dropdown = document.getElementById(id + 'Dropdown');

        trigger.addEventListener('click', (e) => {
          e.stopPropagation();
          // 他のドロップダウンを閉じる
          document.querySelectorAll('.multi-select-dropdown').forEach(d => {
            if (d !== dropdown) {
              d.classList.remove('active');
              d.previousElementSibling.classList.remove('active');
            }
          });

          dropdown.classList.toggle('active');
          trigger.classList.toggle('active');
        });
      });

      // ドキュメントのクリックでドロップダウンを閉じる
      document.addEventListener('click', () => {
        document.querySelectorAll('.multi-select-dropdown.active').forEach(d => {
          d.classList.remove('active');
          d.previousElementSibling.classList.remove('active');
        });
      });
    }

    // フィルタ変更イベント
    function handleFilterChange(filterId) {
      const checkboxes = document.querySelectorAll(`#${filterId}Dropdown input[type="checkbox"]`);
      const selected = Array.from(checkboxes)
        .filter(cb => cb.checked)
        .map(cb => cb.value);

      filterState[filterId] = selected;
      updateFilterBadge(filterId);
      updateMultiSelectTrigger(filterId);
      applyFilters();
    }

    // フィルタバッジ更新
    function updateFilterBadge(filterId) {
      const count = filterState[filterId].length;
      const badge = document.getElementById(filterId + 'Count');
      if (count > 0) {
        badge.textContent = count;
        badge.style.display = 'inline-block';
      } else {
        badge.style.display = 'none';
      }
    }

    // マルチセレクトトリガーテキスト更新
    function updateMultiSelectTrigger(filterId) {
      const trigger = document.getElementById(filterId + 'Trigger');
      const selected = filterState[filterId];

      if (selected.length === 0) {
        trigger.textContent = 'すべて';
      } else if (selected.length === 1) {
        trigger.textContent = selected[0];
      } else {
        trigger.textContent = `${selected[0]} 他${selected.length - 1}`;
      }
    }

    // ========== フィルタイベント ==========
    document.getElementById('searchInput').addEventListener('input', (e) => {
      filterState.search = e.target.value;
      applyFilters();
    });

    // ========== リセットボタン ==========
    document.getElementById('resetFiltersBtn').addEventListener('click', () => {
      filterState.search = '';
      filterState.brand = [];
      filterState.layout = [];
      filterState.switch = [];
      filterState.feel = [];
      filterState.connectivity = [];
      filterState.profile = [];
      filterState.hotswap = [];
      filterState.giteki = [];
      filterState.tag = [];

      document.getElementById('searchInput').value = '';

      // 全チェックボックスを外す
      document.querySelectorAll('.multi-select-dropdown input[type="checkbox"]').forEach(cb => {
        cb.checked = false;
      });

      // トリガーとバッジをリセット
      const filterIds = ['brand', 'layout', 'switch', 'feel', 'connectivity', 'profile', 'hotswap', 'giteki', 'tag'];
      filterIds.forEach(id => {
        updateMultiSelectTrigger(id);
        updateFilterBadge(id);
      });

      sortState.column = null;
      sortState.direction = null;
      applyFilters();
    });

    // ========== フィルタ適用 ==========
    function applyFilters() {
      filteredKeyboards = allKeyboards.filter(kb => {
        // テキスト検索
        if (filterState.search.trim() !== '') {
          const searchLower = filterState.search.toLowerCase();
          const matchesName = kb.name.toLowerCase().includes(searchLower);
          const matchesBrand = kb.brand.toLowerCase().includes(searchLower);
          if (!matchesName && !matchesBrand) return false;
        }

        // ブランド（複数選択）
        if (filterState.brand.length > 0 && !filterState.brand.includes(kb.brand)) return false;

        // レイアウト（複数選択）
        if (filterState.layout.length > 0 && !filterState.layout.includes(kb.specs.layout_size)) return false;

        // スイッチ技術（複数選択）
        if (filterState.switch.length > 0 && !filterState.switch.includes(kb.specs.switch_technology)) return false;

        // スイッチフィール（複数選択、OR条件）
        if (filterState.feel.length > 0) {
          const hasMatchingFeel = filterState.feel.some(feel => kb.specs.switch_feels_available.includes(feel));
          if (!hasMatchingFeel) return false;
        }

        // 接続方式（複数選択、OR条件）
        if (filterState.connectivity.length > 0) {
          const hasMatchingConn = filterState.connectivity.some(conn => kb.specs.connectivity.includes(conn));
          if (!hasMatchingConn) return false;
        }

        // プロファイル（複数選択）
        if (filterState.profile.length > 0 && !filterState.profile.includes(kb.specs.profile)) return false;

        // ホットスワップ（複数選択）
        if (filterState.hotswap.length > 0) {
          const isHotswap = kb.specs.switch_hotswap ? 'true' : 'false';
          if (!filterState.hotswap.includes(isHotswap)) return false;
        }

        // 技適（複数選択）
        if (filterState.giteki.length > 0 && !filterState.giteki.includes(kb.japan_context.giteki)) return false;

        // タグ（複数選択、OR条件）
        if (filterState.tag.length > 0) {
          const hasMatchingTag = filterState.tag.some(tag => kb.tags.includes(tag));
          if (!hasMatchingTag) return false;
        }

        return true;
      });

      // ソート適用
      if (sortState.column && sortState.direction) {
        filteredKeyboards.sort((a, b) => {
          let valA, valB;

          if (sortState.column === 'name') {
            valA = a.name.toLowerCase();
            valB = b.name.toLowerCase();
          } else if (sortState.column === 'layout') {
            const layoutOrder = { '40%': 1, '60%': 2, '65%': 3, '75%': 4, '80% (TKL)': 5, '100% (Full)': 6, 'Split': 7 };
            valA = layoutOrder[a.specs.layout_size] || 999;
            valB = layoutOrder[b.specs.layout_size] || 999;
          } else if (sortState.column === 'profile') {
            valA = a.specs.profile.toLowerCase();
            valB = b.specs.profile.toLowerCase();
          } else if (sortState.column === 'switch') {
            valA = a.specs.switch_technology.toLowerCase();
            valB = b.specs.switch_technology.toLowerCase();
          }

          if (valA < valB) return sortState.direction === 'asc' ? -1 : 1;
          if (valA > valB) return sortState.direction === 'asc' ? 1 : -1;
          return 0;
        });
      }

      renderTable();
      updateCounter();
    }

    // ========== ソートボタン ==========
    document.querySelectorAll('.sort-button').forEach(btn => {
      btn.addEventListener('click', () => {
        const column = btn.getAttribute('data-column');

        if (sortState.column === column) {
          if (sortState.direction === 'asc') {
            sortState.direction = 'desc';
          } else if (sortState.direction === 'desc') {
            sortState.column = null;
            sortState.direction = null;
          }
        } else {
          sortState.column = column;
          sortState.direction = 'asc';
        }

        applyFilters();
      });
    });

    // ========== テーブル表示 ==========
    function renderTable() {
      const tbody = document.getElementById('tableBody');
      const emptyState = document.getElementById('emptyState');

      if (filteredKeyboards.length === 0) {
        tbody.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';
      tbody.innerHTML = filteredKeyboards.map((kb, index) => createTableRow(kb, index + 1)).join('');
    }

    function createTableRow(kb, rowNumber) {
      // レイアウトバッジ
      const layoutClass = kb.specs.layout_size
        .replace('100% (Full)', '100')
        .replace('80% (TKL)', '80')
        .replace('75%', '75')
        .replace('65%', '65')
        .replace('60%', '60')
        .replace('40%', '40')
        .replace('Split', 'split');

      const layoutBadge = `<span class="badge badge-layout badge-layout-${layoutClass}">${kb.specs.layout_size}</span>`;

      // スイッチフィール
      const feelsHtml = `<div class="switch-feels-container">${kb.specs.switch_feels_available.map(feel => {
        const feelClass = feel === 'Linear' ? 'badge-feel-linear' :
                         feel === 'Tactile' ? 'badge-feel-tactile' :
                         'badge-feel-clicky';
        return `<span class="badge badge-feel ${feelClass}">${feel}</span>`;
      }).join('')}</div>`;

      // ホットスワップ
      const hotswapHtml = kb.specs.switch_hotswap
        ? '<span class="hotswap-yes">○</span>'
        : '<span class="hotswap-no">✕</span>';

      // バックライト
      const backlightText = kb.specs.backlight || 'None';

      // 接続方式
      const connectivityHtml = kb.specs.connectivity.map(conn =>
        `<span class="badge badge-connectivity">${conn}</span>`
      ).join('');

      // 技適
      const gitekiInfo = {
        'Certified': '✅',
        'Wired Only': '➖',
        'No/Unknown': '❌'
      }[kb.japan_context.giteki] || '❌';

      // 入手性
      const availabilityClass =
        kb.japan_context.availability === 'Available' ? 'badge-available' :
        kb.japan_context.availability === 'Import Only' ? 'badge-import' :
        'badge-unavailable';
      const availabilityLabel =
        kb.japan_context.availability === 'Available' ? '国内販売' :
        kb.japan_context.availability === 'Import Only' ? '輸入のみ' :
        '入手不可';

      // 購入リンク
      const purchaseLinksHtml = kb.japan_context.purchase_urls.map(url => {
        const domain = new URL(url).hostname;
        let label = 'Buy';
        if (domain.includes('amazon')) label = 'Amazon';
        else if (domain.includes('diatec')) label = 'DIATEC';
        else if (domain.includes('rakuten')) label = '楽天';

        return `<a href="${url}" target="_blank" class="purchase-btn">${label}</a>`;
      }).join('');

      return `
        <tr>
          <td class="product-cell" data-label="モデル名">
            <div class="product-name">${kb.name}</div>
            <div class="product-id">${kb.id}</div>
          </td>
          <td data-label="レイアウト">${layoutBadge}</td>
          <td data-label="プロファイル">${kb.specs.profile}</td>
          <td data-label="スイッチ技術">${kb.specs.switch_technology}</td>
          <td data-label="スイッチフィール">${feelsHtml}</td>
          <td data-label="ホットスワップ">${hotswapHtml}</td>
          <td data-label="バックライト">${backlightText}</td>
          <td data-label="接続">${connectivityHtml}</td>
          <td data-label="技適"><span class="cert-icon">${gitekiInfo}</span></td>
          <td data-label="入手性"><span class="badge badge-availability ${availabilityClass}">${availabilityLabel}</span></td>
          <td class="purchase-links-cell" data-label="購入"><div class="purchase-links-inner">${purchaseLinksHtml}</div></td>
        </tr>
      `;
    }

    // ========== カウンター更新 ==========
    function updateCounter() {
      const modelCount = filteredKeyboards.length;
      const brandCount = new Set(filteredKeyboards.map(kb => kb.brand)).size;

      document.getElementById('modelCount').textContent = modelCount;
      document.getElementById('brandCount').textContent = brandCount;
    }

    // ========== 初期化 ==========
    async function init() {
      initTheme();
      await loadKeyboards();
      initializeFilters();
      setupMultiSelectTriggers();
      applyFilters();
    }

    init();
  </script>
</body>
</html>
